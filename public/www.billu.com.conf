# ============================================================
# VirtualHost : Site public BillU
# URL : http://www.billu.com
# Accessible depuis TOUT internet
# ============================================================

<VirtualHost *:80>

    ServerName www.billu.com
    ServerAlias billu.com

    DocumentRoot /var/www/public

    ErrorLog  /var/log/apache2/public.error.log
    CustomLog /var/log/apache2/public.access.log combined

    <Directory /var/www/public>
        Options FollowSymLinks
        AllowOverride All
        # Accessible depuis TOUT le monde (internet inclus)
        Require all granted
    </Directory>

    # En-têtes de sécurité
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

</VirtualHost>
