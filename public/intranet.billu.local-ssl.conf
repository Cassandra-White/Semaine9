# Redirection HTTP → HTTPS
<VirtualHost *:80>
    ServerName intranet.billu.local
    ServerAlias intranet
    Redirect permanent / https://intranet.billu.local/
</VirtualHost>

# Site HTTPS
<VirtualHost *:443>
    ServerName intranet.billu.local
    ServerAlias intranet

    DocumentRoot /var/www/intranet

    ErrorLog  /var/log/apache2/intranet-ssl.error.log
    CustomLog /var/log/apache2/intranet-ssl.access.log combined

    # Configuration SSL
    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/intranet.crt
    SSLCertificateKeyFile /etc/apache2/ssl/intranet.key

    # Protocoles SSL modernes seulement
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!SHA1

    <Directory /var/www/intranet>
        Options FollowSymLinks
        AllowOverride All
        Require ip 172.16.0.0/16
        Require ip 172.20.0.0/16
        Require ip 127.0.0.1
    </Directory>

    Header always set Strict-Transport-Security "max-age=31536000"
    Header always set X-Content-Type-Options "nosniff"
</VirtualHost>
