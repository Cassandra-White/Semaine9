# ============================================================
# VirtualHost : Intranet BillU
# URL interne : http://intranet.billu.local
# Accessible uniquement depuis 172.16.0.0/16 et 172.20.0.0/16
# ============================================================

<VirtualHost *:80>

    # Nom du site
    ServerName intranet.billu.local
    ServerAlias intranet

    # Répertoire des fichiers
    DocumentRoot /var/www/intranet

    # Logs spécifiques à ce site
    ErrorLog  /var/log/apache2/intranet.error.log
    CustomLog /var/log/apache2/intranet.access.log combined

    # ── Sécurité du répertoire ───────────────────────────────────
    <Directory /var/www/intranet>
        Options FollowSymLinks        # Pas d'Indexes = pas de listing
        AllowOverride All             # Autoriser les .htaccess

        # Restreindre l'accès au réseau interne BillU UNIQUEMENT
        # Les adresses IP hors de ces plages sont refusées
        Require ip 172.16.0.0/16      # LAN BillU (VyOS + VLANs)
        Require ip 172.20.0.0/16      # DMZ BillU (autres serveurs)
        Require ip 127.0.0.1          # Localhost (pour les tests locaux)
    </Directory>

    # ── En-têtes de sécurité HTTP ────────────────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

</VirtualHost>
